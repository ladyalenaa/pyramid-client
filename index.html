  h+='<p class="sect">4. Кем вы были в прошлой жизни</p><div class="cc" style="margin-bottom:10px"><div class="la">Ячейка №'+pastN+'</div><div class="va">'+NMx[pastN]+'</div><div class="da">'+DESC[pastN]+'</div></div>';

  h+='</div>';
  h+='<p class="sect">13. Цвет вашей ауры</p><div class="cc" style="margin-bottom:10px;display:flex;align-items:center;gap:16px"><div class="aura-dot" style="background:'+auraChakra.co+'">'+maxAvg+'</div><div><div style="font-size:20px;font-weight:700;color:'+auraChakra.co+'">'+auraChakra.aura.charAt(0).toUpperCase()+auraChakra.aura.slice(1)+'</div><div style="font-size:13px;color:#7a6490;margin-top:3px">'+auraChakra.ch+'</div></div></div>';

  h+='<p class="sect">15. Место в истории</p><div class="cc" style="margin-bottom:10px"><div class="la">'+auraChakra.ch+' · ячейка №'+histCell+'</div><div class="va">'+NMx[histCell]+'</div><div class="da">'+DESC[histCell]+'</div></div>';
  h+='<p class="sect">16. Путь от 0 до 126 лет</p><div style="font-size:12px;color:#a896bc;margin-bottom:8px">⭐ — ключевые годы &nbsp;·&nbsp; ← сейчас</div>';
  h+='<div style="max-height:420px;overflow-y:auto;border-radius:10px;border:1px solid #d5c8e4;margin-bottom:16px"><table class="ky-table"><thead style="position:sticky;top:0;background:#e4daf0;z-index:1"><tr><th>Год</th><th>Возраст</th><th>Ячейка</th><th>Сценарий</th><th>Число</th><th>Энергия</th><th>⭐</th></tr></thead><tbody>';
  tableRows.forEach(function(r){
    h+='<tr style="'+(r.isCur?'background:rgba(196,81,106,0.08)':r.isKey?'background:rgba(155,126,189,0.12)':'')+'">';
    h+='<td style="font-weight:600;color:'+(r.isCur?'#a0607a':r.isKey?'#7d5fa0':'#3d2b55')+'">'+r.yr+(r.isCur?' ←':'')+'</td>';
    h+='<td>'+r.age+'</td><td style="color:#7d5fa0">№'+r.cell+'</td>';
    h+='<td style="font-size:11px">'+NMx[r.cell]+'</td>';
    h+='<td style="font-weight:700;color:'+r.en.co+'">'+r.val+'</td>';
    h+='<td style="font-size:11px;color:'+r.en.co+'">'+r.en.la+'</td>';
    h+='<td class="star">'+(r.isKey?'⭐':'')+'</td></tr>';
  });
  h+='</tbody></table></div>';
  h+='<p class="sect">17. Характер</p><div class="grid3" style="margin-bottom:10px">';
  charCells.forEach(function(n){var v=vals[n],en=ge(v);h+='<div class="cc"><div class="la">Яч.'+n+'</div><div style="font-size:13px;font-weight:600;color:'+en.co+'">'+NMx[n]+'</div><div class="da">'+v+' · '+en.la+'</div></div>';});

  h+='<p class="sect">21. Энергодиагностика чакр</p><div class="diag-row">';

  h+='<p class="sect">Годовой прогноз</p><div style="font-size:12px;color:#a896bc;margin-bottom:10px">Сейчас вам <b style="color:#7d5fa0">'+ageNow+' лет</b></div><div class="pg">';
  [cy,cy+1,cy+2,cy+3].forEach(function(yr){var cN=pY(base,yyyy,mm,dd,yr),cV=vals[cN],yEn=ge(cV),age=calcAge(yyyy,mm,dd,yr,6);h+='<div class="pb"><div class="pt">'+yr+' ('+age+' лет)</div><div class="pv" style="color:'+yEn.co+'">яч.№'+cN+' / '+cV+'</div><div class="pd">'+NMx[cN]+'<br><span style="color:'+yEn.co+'">'+yEn.la+' — '+yEn.de+'</span></div></div>';});
  h+='</div>';
  h+='<p class="sect">Месячный прогноз — '+cy+'</p><div class="mg">';
  for(var mo=1;mo<=12;mo++){var cN=pM(base,yyyy,mm,dd,cy,mo),cV=vals[cN],mEn=ge(cV),isCur=(mo===cm);h+='<div class="mb'+(isCur?' cur':'')+'\" style=\"background:'+mEn.co+'22;border-color:'+mEn.co+(isCur?';border-width:2px':'')+'\"><div class=\"mn\" style=\"color:'+mEn.co+'\">'+MO[mo-1]+'</div><div style=\"font-size:12px;font-weight:700;color:#7a6490\">яч.'+cN+'</div><div style=\"font-size:16px;font-weight:800;color:'+mEn.co+'\">'+cV+'</div><div style=\"font-size:9px;color:#7a6490;line-height:1.2;margin-top:1px\">'+NMx[cN]+'</div><div style=\"font-size:10px;color:'+mEn.co+'\">'+mEn.la+'</div></div>';}
  h+='</div>';
  h+='<div class="footer-note">Карта создана с любовью 💜<br>Леди Алёна · Авторская система самопознания «Пирамида 42»</div>';
  return h;
}

function render(data){
  var useZ=data.type==='zumer';
  var NMx=useZ?NM_Z:NM;
  var dd=data.dd,mm=data.mm,yyyy=data.yyyy,city=data.city||'',name=data.name||'';
  var base=calcBase(dd,mm,yyyy,city,name);
  var vals={};for(var n=1;n<=42;n++)vals[n]=cellVal(base,n);
  var typeLabel=useZ?'🔥 Зумерская карта':'Карта';
  document.getElementById('clientName').textContent=typeLabel+' для: '+name+' · '+String(dd).padStart(2,'0')+'.'+String(mm).padStart(2,'0')+'.'+yyyy;
  document.title='Пирамида 42 — '+name;
  document.getElementById('main').innerHTML=renderCard(vals,base,dd,mm,yyyy,city,name,useZ);
  buildPyr(vals,base,document.getElementById('pyrEl'),useZ);
}

// === ЗАГРУЗКА ИЗ JSONBIN ===
window.addEventListener('load',function(){
  var params=new URLSearchParams(window.location.search);
  var id=params.get('id');
  if(!id){
    document.getElementById('main').innerHTML='<div class="error-box"><h2>⚠️ Персональная ссылка не найдена</h2><p style="margin-top:10px;color:#7a6490">Эта страница открывается только по персональной ссылке от Леди Алёны.</p></div>';
    document.getElementById('clientName').textContent='';
    return;
  }
  fetch(JSONBIN_URL+id+'/latest',{
    headers:{'X-Master-Key':JSONBIN_KEY,'X-Bin-Meta':false}
  })
  .then(function(r){if(!r.ok)throw new Error('not found');return r.json();})
  .then(function(data){render(data);})
  .catch(function(){
    document.getElementById('main').innerHTML='<div class="error-box"><h2>⚠️ Карта не найдена</h2><p style="margin-top:10px;color:#7a6490">Ссылка устарела или недействительна.<br>Обратитесь к Леди Алёне за новой ссылкой.</p></div>';
    document.getElementById('clientName').textContent='';
  });
});
</script>
