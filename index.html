var LM={};
'АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯ'.split('').forEach(function(c,i){LM[c]=i+1;LM[c.toLowerCase()]=i+1;});

function ge(v){return EN.find(function(e){return v>=e.r[0]&&v<=e.r[1];})||EN[0];}
function bi(v){var BANDS=[7,14,21,28,35,42],i=0;while(i<BANDS.length&&v>BANDS[i])i++;return Math.min(i,5);}
function gl(v,t){return TBLS[t][bi(v)];}

function sumStr(s){var r=0;for(var i=0;i<s.length;i++)r+=LM[s[i]]||0;while(r>42)r-=42;return Math.max(1,r);}
function calcBase(dd,mm,yyyy,city,name){
  var ds=String(dd)+String(mm)+String(yyyy),sd=0;
  ds.split('').forEach(function(d){sd+=+d;});
  var base=sd+sumStr(city.replace(/[^а-яёА-ЯЁ]/g,''))+sumStr(name.replace(/[^а-яёА-ЯЁ]/g,''));
  while(base>42)base-=42;if(base<1)base=1;
  return{base:base,sd:sd,sc:sumStr(city.replace(/[^а-яёА-ЯЁ]/g,'')),sn:sumStr(name.replace(/[^а-яёА-ЯЁ]/g,''))};
}
function cellVal(base,n){var v=(base*n)%42;return v===0?42:v;}
function calcAge(yyyy,mm,dd,yr,curMo){var age=yr-yyyy;if(curMo<mm||(curMo===mm&&new Date().getDate()<dd))age--;return Math.max(0,age);}
function pY(base,yyyy,mm,dd,yr){var age=calcAge(yyyy,mm,dd,yr,new Date().getMonth()+1);var v=base+age-42;while(v>42)v-=42;if(v<1)v=1;return v;}
function pM(base,yyyy,mm,dd,yr,mo){var age=calcAge(yyyy,mm,dd,yr,mo);var v=base+age+mo-42;while(v>42)v-=42;if(v<1)v=1;return v;}

function fillSel(id,items){
  var el=document.getElementById(id);
  if(!el)return;
  items.forEach(function(it){var o=document.createElement('option');o.value=it.v;o.textContent=it.t;el.appendChild(o);});
}
function fillDates(prefix){
  var days=[{v:'',t:'День'}];for(var i=1;i<=31;i++)days.push({v:i,t:i});
  var months=[{v:'',t:'Месяц'}];MO.forEach(function(m,i){months.push({v:i+1,t:m});});
  var years=[{v:'',t:'Год'}];for(var y=2142;y>=1900;y--)years.push({v:y,t:y});
  fillSel(prefix+'_day',days);
  fillSel(prefix+'_month',months);
  fillSel(prefix+'_year',years);
}

  h+='</div><div class="compat-section" style="margin-top:10px"><h4>⚡ Баланс чакр пары</h4><div class="diag-row">';
  cChakraAvgs.forEach(function(d){var pct=Math.round((d.avg/42)*100);
    h+='<div class="diag-bar"><div class="db-name">'+d.ch+'</div><div class="db-track"><div class="db-fill" style="width:'+pct+'%;background:'+d.co+'"></div></div><div class="db-val">'+d.avg+'</div></div>';
    h+='<div style="font-size:11px;color:#a896bc;padding-left:112px;margin-top:-3px;margin-bottom:4px">'+gl(d.avg,'chakra')+'</div>';});
  h+='</div></div>';

  // Базовое число пары = среднее двух базовых
  var bPair=Math.round((vA._base+vB._base)/2);
  if(bPair<1)bPair=1;if(bPair>42)bPair=42;

  function pairAge(yr){
    var now=new Date();
    var ageA=yr-yyyyA;var ageB=yr-yyyyB;
    return Math.round((ageA+ageB)/2);
  }
  function pYPair(yr){
    var age=pairAge(yr);
    var v=bPair+age-42;while(v>42)v-=42;if(v<1)v=1;return v;
  }
  function pMPair(yr,mo){
    var age=pairAge(yr);
    var v=bPair+age+mo-42;while(v>42)v-=42;if(v<1)v=1;return v;
  }

  // Таблица 0-126 лет пары
  var now=new Date(),cy=now.getFullYear(),cm=now.getMonth()+1;
  var pairStartYear=Math.max(yyyyA,yyyyB); // от рождения младшего
  var topValsP=[],rowsP=[];
  for(var a0=0;a0<=126;a0++){
    var yr2=pairStartYear+a0,cN2=pYPair(yr2),cV2=vC[cN2],enP2=ge(cV2);
    rowsP.push({yr:yr2,age:a0,cell:cN2,val:cV2,en:enP2,isCur:(yr2===cy)});
    topValsP.push(cV2);
  }
  topValsP.sort(function(a,b){return b-a;});
  var thrP=topValsP[4]||0;
  rowsP.forEach(function(r){r.isKey=r.val>=thrP;});

  h+='<p class="sect">📅 Годовой прогноз пары</p>';
  h+='<div style="font-size:12px;color:#a896bc;margin-bottom:8px">Базовое число пары: <b style="color:#7d5fa0">'+bPair+'</b> &nbsp;·&nbsp; ⭐ топ-5 лет &nbsp;·&nbsp; ← текущий год</div>';
  h+='<div class="pg">';
  [cy,cy+1,cy+2,cy+3].forEach(function(yr){
    var cN=pYPair(yr),cV=vC[cN],yEn=ge(cV),age=pairAge(yr);
    h+='<div class="pb"><div class="pt">'+yr+' (ср.возраст '+age+')</div><div class="pv" style="color:'+yEn.co+'">яч.№'+cN+' / '+cV+'</div><div class="pd">'+NMx[cN]+'<br><span style="color:'+yEn.co+'">'+yEn.la+' — '+yEn.de+'</span></div></div>';
  });
  h+='</div>';

  h+='<div style="max-height:360px;overflow-y:auto;border-radius:10px;border:1px solid #d5c8e4;margin-bottom:16px"><table class="ky-table"><thead style="position:sticky;top:0;background:#e4daf0;z-index:1"><tr><th>Год</th><th>Ср.возраст</th><th>Ячейка</th><th>Сценарий</th><th>Число</th><th>Энергия</th><th>⭐</th></tr></thead><tbody>';
  rowsP.forEach(function(r){
    h+='<tr style="'+(r.isCur?'background:rgba(160,96,122,.08)':r.isKey?'background:rgba(155,126,189,.1)':'')+'">';
    h+='<td style="font-weight:600;color:'+(r.isCur?'#a0607a':r.isKey?'#7d5fa0':'#3d2b55')+'">'+r.yr+(r.isCur?' ←':'')+'</td>';
    h+='<td>'+r.age+'</td><td style="color:#7d5fa0">№'+r.cell+'</td>';
    h+='<td style="font-size:11px">'+NMx[r.cell]+'</td>';
    h+='<td style="font-weight:700;color:'+r.en.co+'">'+r.val+'</td>';
    h+='<td style="font-size:11px;color:'+r.en.co+'">'+r.en.la+'</td>';
    h+='<td class="star">'+(r.isKey?'⭐':'')+'</td></tr>';
  });
  h+='</tbody></table></div>';

  h+='<p class="sect">📅 Месячный прогноз пары — '+cy+'</p>';
  h+='<div class="mg">';
  for(var mo=1;mo<=12;mo++){
    var cN=pMPair(cy,mo),cV=vC[cN],mEn=ge(cV),isCur=(mo===cm);
    h+='<div class="mb'+(isCur?' cur':'')+'" style="background:'+mEn.co+'22;border-color:'+mEn.co+(isCur?';border-width:2px':'')+'"><div class="mn" style="color:'+mEn.co+'">'+MO[mo-1]+'</div>';
    h+='<div style="font-size:12px;font-weight:700;color:#7a6490">яч.'+cN+'</div>';
    h+='<div style="font-size:16px;font-weight:800;color:'+mEn.co+'">'+cV+'</div>';
    h+='<div style="font-size:9px;color:#7a6490;line-height:1.2;margin-top:1px">'+NMx[cN]+'</div>';
    h+='<div style="font-size:10px;color:'+mEn.co+'">'+mEn.la+'</div></div>';
  }
  h+='</div>';

  return{html:h,vC:vC};
}

// ==================== СОХРАНИТЬ В JSONBIN + ССЫЛКА ====================
function saveAndShowLink(payload,linkBlockId,urlId,btnsId){
  fetch('https://api.jsonbin.io/v3/b',{
    method:'POST',
    headers:{'Content-Type':'application/json','X-Master-Key':JSONBIN_KEY,'X-Bin-Private':'true'},
    body:JSON.stringify(payload)
  }).then(function(r){return r.json();}).then(function(data){
    var id=data.metadata&&data.metadata.id;
    if(!id)throw new Error('no id');
    var url=CLIENT_URL+id;
    document.getElementById(urlId).innerHTML='<span style="word-break:break-all">'+url+'</span>';
    document.getElementById(btnsId).innerHTML=
      '<button class="bc" onclick="navigator.clipboard.writeText(\''+url+'\');this.textContent=\'✅ Скопировано!\';setTimeout(function(){this.textContent=\'📋 Скопировать\';}.bind(this),2000)">📋 Скопировать</button>'+
      '<button class="bo" onclick="window.open(\''+url+'\',\'_blank\')">👁 Открыть карту</button>';
  }).catch(function(){
    document.getElementById(urlId).textContent='⚠️ Ошибка создания ссылки. Проверьте API-ключ.';
  });
}

function linkBlock(name,urlId,btnsId){
  return '<div class="link-block"><div class="lb-title">🔗 Клиентская ссылка для '+name+'</div>'
    +'<div class="lb-url" id="'+urlId+'">⏳ Создаём персональную ссылку...</div>'
    +'<div class="lb-btns" id="'+btnsId+'"></div></div>';
}

}
